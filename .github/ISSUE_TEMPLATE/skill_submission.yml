name: Skill or resource submission
description: Suggest a phone-call skill, provider adapter, scheduler recipe, or resource.
title: "[Submission]: "
labels: [submission]
body:
  - type: input
    id: name
    attributes:
      label: Name
      description: Name of the skill, resource, provider adapter, or scheduler recipe.
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      description: Public URL, if available.
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain how this helps AI agents with phone-call workflows.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety notes
      description: Describe real-world side effects, credential handling, cancellation behavior, and any sensitive domains.
    validations:
      required: true
